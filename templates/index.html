<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">

        <div class="main-content">
            <div class="left-panel">
                <img id="sceneImage" src="/static/images/image.png" alt="Scene">
            </div>

            <div class="center-panel">
                <div class="dm-output" id="dmOutput">
                    <div id="outputContent">Welcome, adventurer. What would you like to do?</div>
                </div>
                <div class="player-input">
                    <textarea id="playerInput" placeholder="Describe your action..."></textarea>
                    <div class="input-buttons">
                        <button onclick="submitAction()">Submit</button>
                        <button onclick="clearInput()">Clear</button>
                    </div>
                </div>
            </div>



            <!-- RIGHT: Tabs -->
            <div class="right-panel">
                <div class="tab-container">
                    <button class="tab-button active" onclick="showRightTab('character')">Character</button>
                    <button class="tab-button" onclick="showRightTab('inventory')">Inventory</button>
                    <button class="tab-button" onclick="showRightTab('party')">Party</button>
                    <button class="tab-button" onclick="showRightTab('quests')">Quests</button>
                </div>

                <!-- Character Sheet (Player) -->
                <div class="tab-content active" id="right-character">
                    <div class="character-sheet-container" id="characterInfo">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Inventory -->
                <div class="tab-content hidden" id="right-inventory">
                    <h3>Inventory</h3>
                    <div class="inventory-grid" id="inventoryGrid"></div>
                </div>

                <!-- Party Member Sheet -->
                <div class="tab-content hidden" id="right-party">
                    <h3>Party Members</h3>
                    <div class="party-buttons" id="partyButtons"></div>
                    <div class="character-sheet-container" id="partyMemberSheet">
                        <p>Select a party member above to view their details.</p>
                    </div>
                </div>

                <!-- Quests -->
                <div class="tab-content hidden" id="right-quests">
                    <h3>Quests</h3>
                    <div id="questList">Loading quests...</div>
                </div>
            </div>

        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
